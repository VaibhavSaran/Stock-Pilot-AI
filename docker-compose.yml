services:
  # PostgreSQL - Stock financial data
  postgres:
    image: postgres:15
    container_name: stockpilot_postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/init_postgres.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - stockpilot_network

  # MongoDB - News articles
  mongodb:
    image: mongo:7.0
    container_name: stockpilot_mongodb
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USER}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD}
      MONGO_INITDB_DATABASE: ${MONGO_DB}
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - stockpilot_network

  # ChromaDB - Vector store for news embeddings
  chromadb:
    image: chromadb/chroma:1.5.3
    container_name: stockpilot_chromadb
    ports:
      - "8001:8000"
    volumes:
      - chroma_data:/data
    healthcheck:
      test: ["CMD", "bash", "-c", "exec 3<>/dev/tcp/localhost/8000 && echo -e 'GET /api/v2/heartbeat HTTP/1.0\r\n\r\n' >&3 && cat <&3 | grep -q '200'"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - stockpilot_network


  # Airflow shared config (YAML anchor)
  x-airflow-common: &airflow-common
    image: apache/airflow:2.9.1
    environment: &airflow-common-env
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/airflow
      AIRFLOW__CORE__FERNET_KEY: ${AIRFLOW__CORE__FERNET_KEY}
      AIRFLOW__CORE__LOAD_EXAMPLES: 'false'
      AIRFLOW__WEBSERVER__SECRET_KEY: ${AIRFLOW__CORE__FERNET_KEY}
      AIRFLOW__WEBSERVER__BASE_URL: "http://3.209.133.64/airflow"
      _PIP_ADDITIONAL_REQUIREMENTS: "yfinance>=1.0.0 pymongo==4.7.2 psycopg2-binary==2.9.9 newsapi-python requests beautifulsoup4 chromadb==1.5.3 google-generativeai langchain-google-genai"
      PYTHONPATH: /opt/airflow/project
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      MONGO_HOST: mongodb
      MONGO_PORT: "27017"
      MONGO_DB: ${MONGO_DB}
      MONGO_USER: ${MONGO_USER}
      MONGO_PASSWORD: ${MONGO_PASSWORD}
      CHROMA_HOST: chromadb
      CHROMA_PORT: "8000"
      CHROMA_COLLECTION_NAME: ${CHROMA_COLLECTION_NAME}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      NEWS_API_KEY: ${NEWS_API_KEY}
      TAVILY_API_KEY: ${TAVILY_API_KEY}
      LANGCHAIN_API_KEY: ${LANGCHAIN_API_KEY}
      LANGCHAIN_TRACING_V2: ${LANGCHAIN_TRACING_V2}
      LANGCHAIN_PROJECT: ${LANGCHAIN_PROJECT}
    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - airflow_logs:/opt/airflow/logs
      - .:/opt/airflow/project
    networks:
      - stockpilot_network

  # Apache Airflow - Init DB + Create Admin User
  airflow-init:
    <<: *airflow-common
    container_name: stockpilot_airflow_init
    environment:
      <<: *airflow-common-env
      _AIRFLOW_DB_MIGRATE: 'true'
      _AIRFLOW_WWW_USER_CREATE: 'true'
      _AIRFLOW_WWW_USER_USERNAME: admin
      _AIRFLOW_WWW_USER_PASSWORD: admin
      _AIRFLOW_WWW_USER_FIRSTNAME: StockPilot
      _AIRFLOW_WWW_USER_LASTNAME: Admin
      _AIRFLOW_WWW_USER_EMAIL: admin@stockpilot.com
      _AIRFLOW_WWW_USER_ROLE: Admin
    command: version
    depends_on:
      postgres:
        condition: service_healthy

  # Apache Airflow - Webserver
  airflow-webserver:
    <<: *airflow-common
    container_name: stockpilot_airflow_webserver
    restart: always
    ports:
      - "8080:8080"
    command: webserver
    depends_on:
      - airflow-init
      - postgres
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8080/airflow/health"]
      interval: 30s
      timeout: 10s
      retries: 5

  # Apache Airflow - Scheduler
  airflow-scheduler:
    <<: *airflow-common
    container_name: stockpilot_airflow_scheduler
    restart: always
    command: scheduler
    depends_on:
      - airflow-init
      - postgres

  # FastAPI - Backend
  api:
    build:
      context: .
      dockerfile: api/Dockerfile
    container_name: stockpilot_api
    restart: always
    env_file: .env
    environment:
      POSTGRES_HOST: postgres
      MONGO_HOST: mongodb
      CHROMA_HOST: chromadb
      CHROMA_PORT: "8000"
      API_HOST: "0.0.0.0"
      API_PORT: "8000"
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      mongodb:
        condition: service_healthy
      chromadb:
        condition: service_healthy
    networks:
      - stockpilot_network

  # Streamlit - Frontend
  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    container_name: stockpilot_frontend
    restart: always
    environment:
      API_BASE_URL: "http://api:8000"
    ports:
      - "8501:8501"
    depends_on:
      - api
    networks:
      - stockpilot_network

volumes:
  postgres_data:
  mongo_data:
  chroma_data:
  airflow_logs:

networks:
  stockpilot_network:
    driver: bridge