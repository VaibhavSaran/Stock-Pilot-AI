version: '3.8'

services:

  # PostgreSQL - Stock financial data
  postgres:
    image: postgres:15
    container_name: stockpilot_postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/init_postgres.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - stockpilot_network

  # MongoDB - News articles
  mongodb:
    image: mongo:7.0
    container_name: stockpilot_mongodb
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USER}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD}
      MONGO_INITDB_DATABASE: ${MONGO_DB}
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - stockpilot_network

  # ChromaDB - Vector store for news embeddings
  chromadb:
    image: chromadb/chroma:latest
    container_name: stockpilot_chromadb
    ports:
      - "8001:8000"
    volumes:
      - chroma_data:/chroma/chroma
    environment:
      - IS_PERSISTENT=TRUE
      - ANONYMIZED_TELEMETRY=FALSE
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/heartbeat"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - stockpilot_network

  # Apache Airflow - Init DB
  airflow-init:
    image: apache/airflow:2.9.1
    container_name: stockpilot_airflow_init
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/airflow
      AIRFLOW__CORE__FERNET_KEY: ${AIRFLOW__CORE__FERNET_KEY}
      AIRFLOW__CORE__LOAD_EXAMPLES: 'false'
    command: db init
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - stockpilot_network

  # Apache Airflow - Webserver
  airflow-webserver:
    image: apache/airflow:2.9.1
    container_name: stockpilot_airflow_webserver
    restart: always
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/airflow
      AIRFLOW__CORE__FERNET_KEY: ${AIRFLOW__CORE__FERNET_KEY}
      AIRFLOW__CORE__LOAD_EXAMPLES: 'false'
      AIRFLOW__WEBSERVER__SECRET_KEY: ${AIRFLOW__CORE__FERNET_KEY}
    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - airflow_logs:/opt/airflow/logs
    ports:
      - "8080:8080"
    command: webserver
    depends_on:
      - airflow-init
      - postgres
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 5
    networks:
      - stockpilot_network

  # Apache Airflow - Scheduler
  airflow-scheduler:
    image: apache/airflow:2.9.1
    container_name: stockpilot_airflow_scheduler
    restart: always
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/airflow
      AIRFLOW__CORE__FERNET_KEY: ${AIRFLOW__CORE__FERNET_KEY}
      AIRFLOW__CORE__LOAD_EXAMPLES: 'false'
    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - airflow_logs:/opt/airflow/logs
    command: scheduler
    depends_on:
      - airflow-init
      - postgres
    networks:
      - stockpilot_network

  # FastAPI - Backend
  api:
    build:
      context: .
      dockerfile: api/Dockerfile
    container_name: stockpilot_api
    restart: always
    env_file:
      - .env
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      mongodb:
        condition: service_healthy
      chromadb:
        condition: service_healthy
    networks:
      - stockpilot_network

  # Streamlit - Frontend
  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    container_name: stockpilot_frontend
    restart: always
    env_file:
      - .env
    ports:
      - "8501:8501"
    depends_on:
      - api
    networks:
      - stockpilot_network

# Volumes
volumes:
  postgres_data:
  mongo_data:
  chroma_data:
  airflow_logs:

# Networks
networks:
  stockpilot_network:
    driver: bridge